<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Meta Shopping - Thông tin sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
<nav class="navbar bg-white border-bottom">
    <div class="container">
        <a href="index.html" class="navbar-brand fw-bold">Meta Shopping</a>
        <a class="btn btn-outline-secondary" href="index.html"><i class="bi bi-arrow-left me-1"></i>Về trang chủ</a>
    </div>
</nav>

<main class="container py-4">
    <div class="row g-4" id="detailRow"></div>
</main>

<footer class="text-center text-muted py-4 border-top">© 2025 Aristino. All rights reserved.</footer>

<script>
    const PRODUCTS = {
        sp1: {name: 'Áo sơ mi Aristino', price: 850000, img: 'images/sp1.jpg', desc:'Chất liệu cotton thoáng mát, form regular fit, phù hợp công sở.'},
        sp2: {name: 'Áo Polo Aristino', price: 650000, img: 'images/sp2.jpg', desc:'Vải pique co giãn 4 chiều, thấm hút tốt, thoải mái vận động.'},
        sp3: {name: 'Quần âu Aristino', price: 950000, img: 'images/sp3.jpg', desc:'Chất liệu cao cấp, đứng form, dễ phối đồ công sở.'},
    };
    const params = new URLSearchParams(location.search);
    const id = params.get('id') || 'sp1';
    const p = PRODUCTS[id] || PRODUCTS['sp1'];
    const row = document.getElementById('detailRow');
    row.innerHTML = `
        <div class="col-md-6">
          <img class="w-100 rounded" src="${p.img}" onerror="this.src='https://fakeimg.pl/600x420?text=SP'" alt="${p.name}">
        </div>
        <div class="col-md-6">
          <h2>${p.name}</h2>
          <div class="fs-4 text-danger fw-bold mb-3">${p.price.toLocaleString('vi-VN')}đ</div>
          <p class="text-secondary">${p.desc}</p>
          <div class="d-flex gap-2">
            <button class="btn btn-outline-secondary" onclick="addToCart('${id}')"><i class="bi bi-bag-plus me-1"></i>Thêm giỏ hàng</button>
            <a href="index.html#san-pham" class="btn btn-primary">Mua thêm</a>
          </div>
        </div>`;

    function addToCart(pid){
        const cart = JSON.parse(localStorage.getItem('cart') || '{}');
        cart[pid] = (cart[pid] || 0) + 1;
        localStorage.setItem('cart', JSON.stringify(cart));
        alert('Đã thêm vào giỏ hàng!');
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
